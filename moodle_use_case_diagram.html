<script>
// ─────────────────────────────────────────────────────────
// USE CASE DESCRIPTIONS
// ─────────────────────────────────────────────────────────
const useCaseDescriptions = {
  uc1:  { name: 'Log In to System',
          description: 'The user (Student or Instructor) authenticates with their Moodle credentials to gain access to their personalised course dashboard and available features.' },
  uc2:  { name: 'Browse Course Content',
          description: 'The student navigates enrolled courses, views resources uploaded by the instructor (documents, videos, links), and accesses lecture materials organised by topic or week.' },
  uc3:  { name: 'Submit Assignment',
          description: 'The student uploads or types a completed assignment before the deadline. The system records the submission timestamp and notifies the instructor.' },
  uc4:  { name: 'Participate in Discussion Forum',
          description: 'The student reads forum threads, posts new messages, and replies to peers or the instructor within a course discussion board to exchange ideas.' },
  uc5:  { name: 'View Grades & Feedback',
          description: 'The student views marks and written feedback for completed activities such as assignments and quizzes, as recorded in the Moodle gradebook by the instructor.' },
  uc6:  { name: 'Take Online Quiz',
          description: 'The student completes a timed or untimed quiz online. The system records answers and calculates the score automatically upon submission.' },
  uc7:  { name: 'Manage Course Materials',
          description: 'The instructor uploads, organises, and updates learning resources (files, pages, URLs, books) within the course structure, controlling availability to students.' },
  uc8:  { name: 'Create and Manage Assignments',
          description: 'The instructor defines assignment parameters: instructions, accepted file types, maximum marks, and due dates. Assignments can be edited or removed at any time.' },
  uc9:  { name: 'Grade Student Submissions',
          description: 'The instructor reviews student work, enters numeric or rubric-based grades, and provides written feedback through the Moodle online grader or gradebook.' },
  uc10: { name: 'Facilitate Discussion Forum',
          description: 'The instructor creates forum topics, pins important posts, moderates student interactions, and responds to questions to guide course discussions.' },
  uc11: { name: 'Deploy Online Quizzes',
          description: 'The instructor builds question banks, configures timing rules and attempt limits, and publishes quizzes to students within specified availability windows.' },
  uc12: { name: 'Send Deadline Reminders',
          description: 'The system clock automatically triggers notification emails and in-app alerts to students when assignment or quiz deadlines are approaching or have passed.' },
  uc13: { name: 'Integrate External Learning Tool',
          description: 'An external LTI-compliant tool (e.g. H5P, Kaltura, Turnitin) communicates with Moodle via the LTI standard to embed interactive content or assessments directly in courses.' }
};

// ─────────────────────────────────────────────────────────
// DESCRIPTION POPUP
// ─────────────────────────────────────────────────────────
function showDescription(ucId, event) {
  hideDescription();
  const uc = useCaseDescriptions[ucId];
  if (!uc) return;
  const panel = document.createElement('div');
  panel.id = 'uc-description-panel';
  panel.innerHTML =
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">' +
      '<strong style="font-size:12px;color:#1e40af;">' + uc.name + '</strong>' +
      '<span onclick="hideDescription()" style="cursor:pointer;color:#94a3b8;font-size:16px;margin-left:10px;">&#x00D7;</span>' +
    '</div>' +
    '<div style="font-size:11px;color:#334155;line-height:1.55;">' + uc.description + '</div>';
  Object.assign(panel.style, {
    position: 'fixed', background: '#fff', border: '1px solid #2980b9',
    borderRadius: '8px', padding: '12px 16px', maxWidth: '300px',
    boxShadow: '0 4px 12px rgba(0,0,0,0.15)', zIndex: '1000',
    left: event.clientX + 'px', top: event.clientY + 'px'
  });
  document.body.appendChild(panel);
  const rect = panel.getBoundingClientRect();
  if (rect.bottom > window.innerHeight)
    panel.style.top  = (event.clientY - rect.height - 10) + 'px';
  if (rect.right > window.innerWidth)
    panel.style.left = (window.innerWidth - rect.width - 10) + 'px';
  event.stopPropagation();
}
function hideDescription() {
  const p = document.getElementById('uc-description-panel');
  if (p) p.remove();
}
document.addEventListener('click', hideDescription);

// ─────────────────────────────────────────────────────────
// DIAGRAM LAYOUT (for Fix Layout)
// ─────────────────────────────────────────────────────────
const diagramLayout = {
  svgId: 'diagram-svg',
  boundary: { x: 188, y: 56, width: 646, height: 730 },
  actors: [
    { id: 'a1', label: 'Student',      side: 'left',  x: 80,  y: 380, ucIds: ['uc1','uc2','uc3','uc4','uc5','uc6'] },
    { id: 'a2', label: 'Instructor',   side: 'right', x: 978, y: 380, ucIds: ['uc1','uc7','uc8','uc9','uc10','uc11'] },
    { id: 'a3', label: 'System Time',  side: 'right', x: 978, y: 710, ucIds: ['uc12'] },
    { id: 'a4', label: 'LTI Provider', side: 'left',  x: 78,  y: 710, ucIds: ['uc13'] }
  ],
  useCases: [
    { id: 'uc1',  cx: 511, cy: 112, rx: 98,  ry: 26 },
    { id: 'uc2',  cx: 330, cy: 205, rx: 102, ry: 26 },
    { id: 'uc3',  cx: 330, cy: 300, rx: 102, ry: 26 },
    { id: 'uc4',  cx: 330, cy: 395, rx: 102, ry: 26 },
    { id: 'uc5',  cx: 330, cy: 490, rx: 102, ry: 26 },
    { id: 'uc6',  cx: 330, cy: 585, rx: 102, ry: 26 },
    { id: 'uc7',  cx: 693, cy: 205, rx: 106, ry: 26 },
    { id: 'uc8',  cx: 693, cy: 300, rx: 106, ry: 26 },
    { id: 'uc9',  cx: 693, cy: 395, rx: 106, ry: 26 },
    { id: 'uc10', cx: 693, cy: 490, rx: 106, ry: 26 },
    { id: 'uc11', cx: 693, cy: 585, rx: 106, ry: 26 },
    { id: 'uc12', cx: 693, cy: 710, rx: 106, ry: 26 },
    { id: 'uc13', cx: 330, cy: 710, rx: 106, ry: 26 }
  ],
  connections: [
    { from: 'a1', to: 'uc1',  type: 'association' },
    { from: 'a1', to: 'uc2',  type: 'association' },
    { from: 'a1', to: 'uc3',  type: 'association' },
    { from: 'a1', to: 'uc4',  type: 'association' },
    { from: 'a1', to: 'uc5',  type: 'association' },
    { from: 'a1', to: 'uc6',  type: 'association' },
    { from: 'a2', to: 'uc1',  type: 'association' },
    { from: 'a2', to: 'uc7',  type: 'association' },
    { from: 'a2', to: 'uc8',  type: 'association' },
    { from: 'a2', to: 'uc9',  type: 'association' },
    { from: 'a2', to: 'uc10', type: 'association' },
    { from: 'a2', to: 'uc11', type: 'association' },
    { from: 'a3', to: 'uc12', type: 'association' },
    { from: 'a4', to: 'uc13', type: 'association' }
  ]
};

// ─────────────────────────────────────────────────────────
// FIX LAYOUT (idempotent — always sets absolute attributes)
// ─────────────────────────────────────────────────────────
function fixLayout(layout) {
  const svg = document.getElementById(layout.svgId);
  if (!svg) return;
  const pad = 80;

  // Group UCs by actor side
  const ucActorSide = {};
  layout.actors.forEach(a => {
    a.ucIds.forEach(uid => {
      if (!ucActorSide[uid]) ucActorSide[uid] = a.side;
      else if (ucActorSide[uid] !== a.side) ucActorSide[uid] = 'center';
    });
  });
  const leftUCs = [], rightUCs = [], centerUCs = [];
  layout.useCases.forEach(uc => {
    const s = ucActorSide[uc.id] || 'center';
    if (s === 'left') leftUCs.push(uc);
    else if (s === 'right') rightUCs.push(uc);
    else centerUCs.push(uc);
  });

  function sortByActorOrder(ucs, side) {
    const ordered = layout.actors.filter(a => a.side === side).sort((a,b) => a.y - b.y);
    ucs.sort((a, b) => {
      const ai = ordered.findIndex(act => act.ucIds.includes(a.id));
      const bi = ordered.findIndex(act => act.ucIds.includes(b.id));
      return (ai < 0 ? 999 : ai) - (bi < 0 ? 999 : bi);
    });
  }
  sortByActorOrder(leftUCs,  'left');
  sortByActorOrder(rightUCs, 'right');

  const bx = layout.boundary.x, bw = layout.boundary.width;
  function redistribute(ucs, colX) {
    if (!ucs.length) return;
    const startY = layout.boundary.y + 70;
    ucs.forEach((uc, i) => {
      uc.cy = startY + i * (uc.ry * 2 + pad) + uc.ry;
      uc.cx = colX;
    });
  }
  redistribute(leftUCs,   bx + bw * 0.28);
  redistribute(rightUCs,  bx + bw * 0.72);
  redistribute(centerUCs, bx + bw * 0.50);

  // Re-centre actors on their UC groups
  layout.actors.forEach(actor => {
    const mine = layout.useCases.filter(u => actor.ucIds.includes(u.id));
    if (mine.length) actor.y = mine.reduce((s, u) => s + u.cy, 0) / mine.length;
  });

  // Grow boundary if needed
  const maxUCy = Math.max(...layout.useCases.map(u => u.cy + u.ry));
  layout.boundary.height = Math.max(layout.boundary.height, maxUCy - layout.boundary.y + 60);

  // Apply UC positions
  layout.useCases.forEach(uc => {
    const g = document.getElementById('uc-group-' + uc.id);
    if (!g) return;
    const el = g.querySelector('ellipse');
    if (!el) return;
    const dx = uc.cx - parseFloat(el.getAttribute('cx'));
    const dy = uc.cy - parseFloat(el.getAttribute('cy'));
    el.setAttribute('cx', uc.cx);
    el.setAttribute('cy', uc.cy);
    g.querySelectorAll('text').forEach(t => {
      t.setAttribute('x', parseFloat(t.getAttribute('x')) + dx);
      t.setAttribute('y', parseFloat(t.getAttribute('y')) + dy);
    });
    g.removeAttribute('transform');
  });

  // Apply actor positions
  layout.actors.forEach(actor => {
    const g = document.getElementById('actor-group-' + actor.id);
    if (g) g.setAttribute('transform', 'translate(' + actor.x + ',' + actor.y + ')');
  });

  // Recalculate all connection line endpoints
  svg.querySelectorAll('[data-conn-from][data-conn-to]').forEach(line => {
    const fromId = line.getAttribute('data-conn-from');
    const toId   = line.getAttribute('data-conn-to');
    const fromUC    = layout.useCases.find(u => u.id === fromId);
    const fromActor = layout.actors.find(a => a.id === fromId);
    const toUC      = layout.useCases.find(u => u.id === toId);
    const toActor   = layout.actors.find(a => a.id === toId);
    const from = fromActor ? { x: fromActor.x, y: fromActor.y }
               : fromUC   ? { x: fromUC.cx,   y: fromUC.cy   } : null;
    const to   = toActor  ? { x: toActor.x,   y: toActor.y   }
               : toUC     ? { x: toUC.cx,     y: toUC.cy     } : null;
    if (!from || !to) return;
    let x1 = from.x, y1 = from.y, x2 = to.x, y2 = to.y;
    if (toUC) {
      const a = Math.atan2(from.y - toUC.cy, from.x - toUC.cx);
      x2 = toUC.cx + toUC.rx * Math.cos(a);
      y2 = toUC.cy + toUC.ry * Math.sin(a);
    }
    if (fromUC) {
      const a = Math.atan2(to.y - fromUC.cy, to.x - fromUC.cx);
      x1 = fromUC.cx + fromUC.rx * Math.cos(a);
      y1 = fromUC.cy + fromUC.ry * Math.sin(a);
    }
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
  });

  // Resize boundary rect + viewBox
  const boundRect = svg.querySelector('.system-boundary');
  if (boundRect) boundRect.setAttribute('height', layout.boundary.height);
  const vb = svg.getAttribute('viewBox');
  if (vb) {
    const parts = vb.split(/\s+/);
    const totalH = layout.boundary.y + layout.boundary.height + 40;
    parts[3] = Math.max(parseFloat(parts[3]), totalH);
    svg.setAttribute('viewBox', parts.join(' '));
    svg.setAttribute('height', parts[3]);
  }
}
</script>
</body>
</html>
